<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SCANDGO 아이콘 생성기</title>
<style>
body { font-family: sans-serif; background:#1a1a2e; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:20px; margin:0; }
h2 { font-size:18px; margin:0; }
.desc { font-size:13px; color:#aaa; }
canvas { border-radius:20px; box-shadow:0 8px 40px rgba(0,0,0,.5); width:300px; height:300px; }
button {
  padding:12px 32px; border-radius:8px; border:none;
  background:#00c9a7; color:#fff; font-size:15px; font-weight:700; cursor:pointer;
}
button:hover { background:#00a88a; }
.note { font-size:12px; color:#888; text-align:center; max-width:400px; line-height:1.6; }
</style>
</head>
<body>
<h2>SCANDGO 앱 아이콘 생성기</h2>
<p class="desc">아래 버튼을 눌러 1024×1024 아이콘을 다운로드하세요</p>
<canvas id="c" width="1024" height="1024"></canvas>
<button onclick="download()">아이콘 다운로드 (icon.png)</button>
<p class="note">
  다운로드 후 파일명을 <strong>icon.png</strong>으로 저장하고<br>
  <code>tapin2/resources/</code> 폴더에 넣으세요.
</p>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = 1024;

/* ── Rounded rect helper ── */
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function draw() {
  const teal = '#00c9a7';

  /* ── Navy background ── */
  ctx.fillStyle = '#0f1b2d';
  roundRect(0, 0, W, W, 150);
  ctx.fill();

  /* ── Stroke settings ── */
  ctx.strokeStyle = teal;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.lineWidth = 62;

  /* ── Draw a polyline ── */
  function line(pts) {
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.stroke();
  }

  const PAD = 105;  // padding from icon edge
  const LEG = 200;  // bracket leg length

  /* ── Four corner L-brackets ── */
  line([[PAD, PAD + LEG], [PAD, PAD], [PAD + LEG, PAD]]);                        // TL
  line([[W - PAD - LEG, PAD], [W - PAD, PAD], [W - PAD, PAD + LEG]]);            // TR
  line([[PAD, W - PAD - LEG], [PAD, W - PAD], [PAD + LEG, W - PAD]]);            // BL
  line([[W - PAD - LEG, W - PAD], [W - PAD, W - PAD], [W - PAD, W - PAD - LEG]]); // BR

  /* ── Right-pointing arrow (centered) ── */
  const CY    = W / 2;
  const aL    = 232;       // body left x
  const aR    = W - 218;   // arrow tip x
  const hD    = 178;       // arrowhead depth (horizontal)
  const hH    = 196;       // arrowhead half-height
  const bodyEnd = aR - hD;

  line([[aL, CY], [bodyEnd, CY]]);            // body
  line([[bodyEnd, CY - hH], [aR, CY], [bodyEnd, CY + hH]]); // arrowhead V
}

draw();

function download() {
  const a = document.createElement('a');
  a.download = 'icon.png';
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
