<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SCANDGO 아이콘 생성기</title>
<style>
body { font-family: sans-serif; background:#1a1a2e; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:20px; margin:0; }
h2 { font-size:18px; margin:0; }
.desc { font-size:13px; color:#aaa; }
canvas { border-radius:20px; box-shadow:0 8px 40px rgba(0,0,0,.5); }
button {
  padding:12px 32px; border-radius:8px; border:none;
  background:#00c9a7; color:#fff; font-size:15px; font-weight:700; cursor:pointer;
}
button:hover { background:#00a88a; }
.note { font-size:12px; color:#888; text-align:center; max-width:400px; line-height:1.6; }
</style>
</head>
<body>
<h2>SCANDGO 앱 아이콘 생성기</h2>
<p class="desc">아래 버튼을 눌러 1024×1024 아이콘을 다운로드하세요</p>
<canvas id="c" width="1024" height="1024"></canvas>
<button onclick="download()">아이콘 다운로드 (icon.png)</button>
<p class="note">
  다운로드 후 파일명을 <strong>icon.png</strong>으로 저장하고<br>
  <code>tapin2/resources/</code> 폴더에 넣으세요.
</p>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = 1024;

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function draw() {
  // Background
  ctx.fillStyle = '#0f1b2d';
  roundRect(0, 0, W, W, 180);
  ctx.fill();

  const teal = '#00c9a7';
  const s = W / 28; // scale unit (based on 28x28 viewBox)

  function cell(x, y, w, h, r, color, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha ?? 1;
    ctx.fillStyle = color ?? teal;
    roundRect(x * s, y * s, w * s, h * s, r * s);
    ctx.fill();
    ctx.restore();
  }

  function border(x, y, w, h, r, sw) {
    ctx.save();
    ctx.strokeStyle = teal;
    ctx.lineWidth = sw * s;
    roundRect(x * s, y * s, w * s, h * s, r * s);
    ctx.stroke();
    ctx.restore();
  }

  // QR-code-like pattern (scaled from 28x28 viewBox)
  // Outer rounded rect (logo bg)
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = teal;
  roundRect(1.5 * s, 1.5 * s, 25 * s, 25 * s, 6 * s);
  ctx.fill();
  ctx.restore();

  border(1.5, 1.5, 25, 25, 6, 1.2);

  // Top-left finder
  border(6, 6, 6.5, 6.5, 1.2, 1.2);
  cell(7.5, 7.5, 3.5, 3.5, 0.5);

  // Top-right finder
  border(15.5, 6, 6.5, 6.5, 1.2, 1.2);
  cell(17, 7.5, 3.5, 3.5, 0.5);

  // Bottom-left finder
  border(6, 15.5, 6.5, 6.5, 1.2, 1.2);
  cell(7.5, 17, 3.5, 3.5, 0.5);

  // Bottom-right data dots
  cell(15.5, 15.5, 2.5, 2.5, 0.4);
  cell(19.5, 15.5, 2.5, 2.5, 0.4, teal, 0.5);
  cell(15.5, 19.5, 2.5, 2.5, 0.4, teal, 0.5);
  cell(19.5, 19.5, 2.5, 2.5, 0.4);
}

draw();

function download() {
  const a = document.createElement('a');
  a.download = 'icon.png';
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
