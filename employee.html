<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1b2d">
<title>TAGIN — 직원 앱</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --green:#00c9a7;--green3:#e0faf6;--blue:#1565c0;
  --gray1:#f4f6f9;--gray2:#e2e7ef;--gray3:#8a94a6;--gray4:#3d4a5c;
  --dark:#0f1b2d;--white:#fff;--red:#f04438;--orange:#f79009;
  --navy:#0f1b2d;--navy2:#1a2d45;
  --shadow:0 2px 12px rgba(0,0,0,.10);
}
html{background:linear-gradient(145deg,#060d16 0%,#0f1b2d 55%,#0d2a3a 100%);}
body{font-family:'Inter','Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--gray1);color:var(--dark);max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.4);}

.topbar{background:var(--navy);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
.topbar .logo{font-size:18px;font-weight:900;letter-spacing:2px;color:#fff;}
.topbar .logo span{color:var(--green);}
.topbar .user-info{font-size:13px;opacity:.85;text-align:right;}
.topbar .user-info strong{display:block;font-size:14px;opacity:1;}
.topbar .menu-btn{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;}

.status-card{background:linear-gradient(135deg,#0f1b2d,#1a2d45,#0d3040);color:#fff;margin:16px;border-radius:14px;padding:22px 20px;box-shadow:0 4px 18px rgba(0,0,0,.25);border:1px solid rgba(0,201,167,.2);}
.status-card.checkedout{background:linear-gradient(135deg,#1a2a3a,#243650);border-color:rgba(255,255,255,.1);}
.status-card .store-name{font-size:13px;opacity:.8;margin-bottom:6px;}
.status-card .cur-status{font-size:22px;font-weight:900;margin-bottom:6px;}
.status-card .cur-time{font-size:32px;font-weight:900;letter-spacing:1px;font-variant-numeric:tabular-nums;}
.status-card .work-time{font-size:13px;opacity:.8;margin-top:6px;min-height:18px;}
.status-row{display:flex;justify-content:space-between;align-items:flex-end;margin-top:10px;}
.status-badge{background:rgba(0,201,167,.2);color:var(--green);padding:5px 14px;border-radius:20px;font-size:13px;font-weight:700;}

.qr-section{padding:0 16px 16px;}
.qr-main-btn{width:100%;background:linear-gradient(135deg,#00c9a7,#00b096);color:#fff;border:none;border-radius:14px;padding:22px;font-size:20px;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:0 6px 20px rgba(0,201,167,.35);}
.qr-main-btn.checkout{background:linear-gradient(135deg,#1565c0,#1976d2);box-shadow:0 6px 20px rgba(21,101,192,.3);}
.qr-main-btn .qr-icon{font-size:48px;}
.qr-sub{font-size:13px;opacity:.85;font-weight:500;}

.scan-view{display:none;position:fixed;inset:0;background:#000;z-index:1000;flex-direction:column;align-items:center;justify-content:center;}
.scan-view.active{display:flex;}
.scan-video-wrap{position:relative;width:100vw;max-width:420px;aspect-ratio:1;}
#scan-video{width:100%;height:100%;object-fit:cover;}
.scan-frame{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:260px;height:260px;border:3px solid #00c9a7;border-radius:16px;pointer-events:none;}
.scan-text{color:#fff;font-size:16px;margin:24px 0 8px;}
.scan-sub{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:24px;}
.scan-cancel{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:12px 32px;border-radius:8px;font-size:15px;cursor:pointer;}
.scan-manual{color:rgba(255,255,255,.55);font-size:13px;margin-top:14px;cursor:pointer;text-decoration:underline;background:none;border:none;}

.success-view{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:1001;align-items:center;justify-content:center;padding:20px;}
.success-view.active{display:flex;}
.success-box{background:#fff;border-radius:20px;padding:36px 28px;text-align:center;width:100%;max-width:320px;}
.success-icon{font-size:64px;margin-bottom:12px;}
.success-box h2{font-size:22px;font-weight:900;margin-bottom:6px;}
.success-box .success-time{font-size:36px;font-weight:900;color:#00a88a;margin:8px 0 4px;}
.success-box .success-extra{font-size:13px;color:var(--gray3);background:var(--green3);padding:6px 14px;border-radius:20px;display:inline-block;margin:8px 0 20px;color:#00a88a;}
.success-box button{width:100%;padding:14px;border-radius:10px;background:linear-gradient(135deg,#00c9a7,#00b096);color:#fff;border:none;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(0,201,167,.3);}

.section{background:var(--white);margin:0 16px 16px;border-radius:12px;box-shadow:var(--shadow);overflow:hidden;}
.section-header{padding:14px 16px;border-bottom:1px solid var(--gray2);font-size:14px;font-weight:800;}
.record-item{padding:13px 16px;border-bottom:1px solid var(--gray2);display:flex;align-items:center;gap:12px;}
.record-item:last-child{border-bottom:none;}
.rec-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.rec-icon.in{background:var(--green3);}
.rec-icon.out{background:#e8f0fe;}
.rec-info{flex:1;min-width:0;}
.rec-info .rec-title{font-size:14px;font-weight:700;}
.rec-info .rec-sub{font-size:12px;color:var(--gray3);}
.rec-time{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;}
.rec-time.in{color:#00a88a;}
.rec-time.out{color:var(--blue);}

.month-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--gray2);}
.month-item{background:#fff;padding:16px 8px;text-align:center;}
.month-item .m-val{font-size:22px;font-weight:900;margin-bottom:3px;}
.month-item .m-label{font-size:11px;color:var(--gray3);}

.tab-bar{background:var(--white);border-top:1px solid var(--gray2);display:flex;position:sticky;bottom:0;padding-bottom:env(safe-area-inset-bottom);}
.tab-item{flex:1;padding:12px 0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;font-size:10px;color:var(--gray3);font-family:inherit;}
.tab-item.active{color:var(--green);}
.tab-item .t-icon{font-size:22px;}

.page-view{display:none;flex:1;}
.page-view.active{display:block;}

.history-month{font-size:12px;font-weight:700;color:var(--gray3);padding:10px 16px 4px;}

.salary-card{background:linear-gradient(135deg,#0f1b2d,#1a2d45);color:#fff;margin:16px;border-radius:14px;padding:22px 20px;border:1px solid rgba(0,201,167,.2);}
.salary-card .s-month{font-size:13px;opacity:.7;margin-bottom:4px;}
.salary-card .s-amount{font-size:32px;font-weight:900;margin-bottom:6px;}
.salary-card .s-date{font-size:13px;opacity:.7;}
.salary-detail{margin:0 16px 16px;background:#fff;border-radius:12px;box-shadow:var(--shadow);}
.sal-row{display:flex;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--gray2);font-size:14px;}
.sal-row:last-child{border-bottom:none;font-weight:800;}
.sal-row.deduct span:last-child{color:var(--red);}

.profile-header{background:linear-gradient(145deg,#0f1b2d,#1a2d45);color:#fff;padding:28px 16px 22px;text-align:center;}
.profile-header .avatar{width:72px;height:72px;border-radius:50%;background:rgba(0,201,167,.2);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;border:3px solid rgba(0,201,167,.4);}
.profile-header .pname{font-size:20px;font-weight:800;}
.profile-header .ppos{font-size:13px;opacity:.7;margin-top:4px;}
.profile-list{background:#fff;margin:16px;border-radius:12px;box-shadow:var(--shadow);overflow:hidden;}
.profile-row{padding:14px 16px;border-bottom:1px solid var(--gray2);display:flex;justify-content:space-between;font-size:14px;}
.profile-row:last-child{border-bottom:none;}
.profile-row span:first-child{color:var(--gray3);}
.profile-row span:last-child{font-weight:700;}
.logout-btn{width:calc(100% - 32px);margin:0 16px 24px;padding:14px;background:#fff;border:1.5px solid var(--gray2);border-radius:10px;color:var(--red);font-size:15px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>

<!-- 상단바 -->
<div class="topbar">
  <div class="logo">TAG<span>IN</span></div>
  <div class="user-info">
    <strong id="user-name">-</strong>
    <span id="user-store">직원</span>
  </div>
</div>

<!-- 오늘 페이지 -->
<div class="page-view active" id="page-today">

  <div class="status-card checkedout" id="status-card">
    <div class="store-name" id="store-name">불러오는 중…</div>
    <div class="cur-status" id="cur-status">⚪ 미출근</div>
    <div class="cur-time" id="cur-time">--:--:--</div>
    <div class="work-time" id="work-time"></div>
    <div class="status-row">
      <div></div>
      <div class="status-badge" id="status-shift"></div>
    </div>
  </div>

  <div class="qr-section">
    <button class="qr-main-btn" id="qr-main-btn">
      <div class="qr-icon">📷</div>
      <div id="qr-btn-label">출근하기</div>
      <div class="qr-sub" id="qr-btn-sub">QR 스캔으로 출근 처리</div>
    </button>
  </div>

  <div class="section">
    <div class="section-header">오늘 기록</div>
    <div id="today-records"></div>
  </div>

  <div class="section">
    <div class="section-header">이번 달 요약</div>
    <div class="month-summary">
      <div class="month-item"><div class="m-val" id="m-days">-</div><div class="m-label">근무일</div></div>
      <div class="month-item"><div class="m-val" id="m-hours">-</div><div class="m-label">총 시간</div></div>
      <div class="month-item"><div class="m-val" id="m-pay">-</div><div class="m-label">예상 급여</div></div>
    </div>
  </div>
</div>

<!-- 내역 페이지 -->
<div class="page-view" id="page-history">
  <div class="section" style="margin-top:16px;">
    <div class="section-header">최근 30일 기록</div>
    <div id="history-list"></div>
  </div>
</div>

<!-- 급여 페이지 -->
<div class="page-view" id="page-salary">
  <div class="salary-card">
    <div class="s-month">이번 달 예상</div>
    <div class="s-amount" id="sal-amount">-</div>
    <div class="s-date" id="sal-date">월말 정산 시 자동 계산</div>
  </div>
  <div class="salary-detail" id="sal-rows"></div>
</div>

<!-- 프로필 페이지 -->
<div class="page-view" id="page-profile">
  <div class="profile-header">
    <div class="avatar">🙂</div>
    <div class="pname" id="profile-name">-</div>
    <div class="ppos" id="profile-position">-</div>
  </div>
  <div class="profile-list">
    <div class="profile-row"><span>전화번호</span><span id="profile-phone">-</span></div>
    <div class="profile-row"><span>역할</span><span>직원</span></div>
  </div>
  <button class="logout-btn" id="btn-logout">로그아웃</button>
</div>

<!-- 탭바 -->
<div class="tab-bar">
  <button class="tab-item active" data-tab="today">
    <div class="t-icon">🏠</div><div>홈</div>
  </button>
  <button class="tab-item" data-tab="history">
    <div class="t-icon">📅</div><div>내역</div>
  </button>
  <button class="tab-item" data-tab="salary">
    <div class="t-icon">💰</div><div>급여</div>
  </button>
  <button class="tab-item" data-tab="profile">
    <div class="t-icon">👤</div><div>프로필</div>
  </button>
</div>

<!-- 스캔 화면 -->
<div class="scan-view" id="scan-view">
  <div class="scan-video-wrap">
    <video id="scan-video" playsinline muted></video>
    <div class="scan-frame"></div>
  </div>
  <div class="scan-text">QR 코드를 프레임에 맞춰주세요</div>
  <div class="scan-sub">매장에 부착된 TAGIN QR 코드를 스캔</div>
  <button class="scan-cancel" id="scan-cancel">취소</button>
  <button class="scan-manual" id="scan-manual">직접 입력</button>
</div>

<!-- 성공 화면 -->
<div class="success-view" id="success-view">
  <div class="success-box">
    <div class="success-icon" id="success-icon">✅</div>
    <h2 id="success-title">완료!</h2>
    <div class="success-time" id="success-time">--:--</div>
    <div class="success-extra" id="success-extra"></div>
    <button id="success-ok">확인</button>
  </div>
</div>

<script type="module" src="/src/pages/employee/employee.js"></script>
</body>
</html>
